name: Build Spray Packager

on:
  push:
    tags: ["spray-packager-v*"]
  pull_request:
    paths:
      - "tools/spray-packager/**"
      - ".github/workflows/build-spray-packager.yml"
  workflow_dispatch:

defaults:
  run:
    working-directory: tools/spray-packager

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Run tests
        run: python tests/test_pipeline.py

      - name: Build exe
        run: >
          pyinstaller --noconfirm --clean --onefile --windowed
          --name SprayPackager --collect-all rasterio spray_packager.py

      - name: Smoke test built exe
        timeout-minutes: 5
        env:
          SPRAY_PACKAGER_SMOKE: "1"
        run: |
          $p = Start-Process -FilePath dist\SprayPackager.exe -Wait -PassThru
          if ($p.ExitCode -ne 0) { exit 1 }

      - uses: actions/upload-artifact@v4
        with:
          name: SprayPackager
          path: tools/spray-packager/dist/SprayPackager.exe

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/spray-packager-v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "${{ github.ref_name }}" dist/SprayPackager.exe
          --title "Spray Packager ${{ github.ref_name }}"
          --notes "Windows download: SprayPackager.exe (below). See tools/spray-packager/README.md for usage."
